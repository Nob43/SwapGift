<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GiftMatch Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0b0f19;
            --bg2: #111827;
            --surface: #141b2d;
            --card: #151e33;
            --line: #273453;
            --text: #edf3ff;
            --muted: #9aa8c7;
            --primary: #5bb4ff;
            --primary-2: #7a8cff;
            --green: #36d39a;
            --danger: #ff6478;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(1200px 700px at 10% -10%, #1a2850 0%, transparent 55%),
                        radial-gradient(900px 500px at 90% -15%, #20335c 0%, transparent 50%),
                        linear-gradient(180deg, var(--bg2), var(--bg));
            color: var(--text);
            min-height: 100vh;
        }

        .app {
            padding-bottom: 82px;
        }

        .top {
            padding: 18px 16px 14px;
            border-bottom: 1px solid rgba(125, 147, 199, 0.16);
            background: linear-gradient(180deg, rgba(25, 34, 56, 0.82), rgba(11, 15, 25, 0.55));
            backdrop-filter: blur(8px);
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: #061427;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            box-shadow: 0 8px 22px rgba(72, 136, 255, 0.35);
        }

        .title {
            font-size: 18px;
            margin: 0;
        }

        .subtitle {
            margin: 2px 0 0;
            color: var(--muted);
            font-size: 12px;
        }

        .tab-content {
            display: none;
            padding: 14px 12px;
        }

        .tab-content.active { display: block; }

        .card {
            background: linear-gradient(180deg, rgba(24, 35, 60, 0.84), rgba(21, 30, 51, 0.9));
            border: 1px solid rgba(121, 146, 201, 0.22);
            border-radius: 16px;
            padding: 13px;
            margin-bottom: 12px;
            box-shadow: 0 12px 24px rgba(1, 7, 18, 0.28);
        }

        .card-title {
            margin: 0 0 10px;
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .gift-item {
            border: 1px solid rgba(124, 149, 206, 0.24);
            background: linear-gradient(180deg, rgba(21, 31, 51, 0.95), rgba(17, 25, 40, 0.95));
            border-radius: 14px;
            padding: 10px;
        }

        .gift-emoji {
            font-size: 24px;
            margin-bottom: 8px;
            display: block;
        }

        .gift-name {
            font-size: 13px;
            margin: 0 0 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row {
            display: flex;
            gap: 8px;
        }

        input, select, button {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(121, 146, 201, 0.35);
            background: var(--surface);
            color: var(--text);
            padding: 10px 11px;
            font-size: 13px;
            outline: none;
        }

        input::placeholder { color: #8d9bc0; }
        input:focus, select:focus {
            border-color: rgba(102, 177, 255, 0.95);
            box-shadow: 0 0 0 3px rgba(91, 180, 255, 0.15);
        }

        button {
            cursor: pointer;
            background: linear-gradient(180deg, #243a63, #223149);
            border-color: rgba(106, 145, 222, 0.5);
            transition: transform 0.08s ease, filter 0.15s ease;
        }
        button:active { transform: translateY(1px) scale(0.99); }
        button:hover { filter: brightness(1.06); }

        button.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            border-color: rgba(165, 197, 255, 0.82);
            color: #041427;
            font-weight: 700;
        }

        button.success {
            background: linear-gradient(135deg, var(--green), #6ae9ba);
            border-color: #93f1cf;
            color: #05291b;
            font-weight: 700;
        }

        .listing {
            border: 1px solid rgba(125, 149, 202, 0.24);
            border-radius: 14px;
            padding: 10px;
            background: linear-gradient(180deg, rgba(22, 30, 50, 0.94), rgba(18, 26, 43, 0.96));
            margin-bottom: 8px;
        }

        .listing-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .price {
            font-weight: 700;
            color: #c7ddff;
        }

        .badge {
            font-size: 11px;
            color: #d6e0f4;
            padding: 3px 8px;
            border: 1px solid rgba(125, 149, 202, 0.35);
            border-radius: 999px;
            background: rgba(108, 138, 199, 0.12);
        }

        .empty {
            color: var(--muted);
            text-align: center;
            font-size: 13px;
            padding: 10px 6px;
        }

        .status-ok { color: var(--green); }
        .status-bad { color: var(--danger); }

        .tab-bar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(9, 13, 23, 0.88);
            border-top: 1px solid rgba(121, 146, 201, 0.2);
            backdrop-filter: blur(12px);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 7px 6px 10px;
        }

        .tab-item {
            border: 0;
            background: transparent;
            color: var(--muted);
            padding: 10px 5px;
            border-radius: 12px;
            font-size: 12px;
        }

        .tab-item.active {
            color: var(--text);
            background: linear-gradient(180deg, rgba(94, 148, 255, 0.25), rgba(95, 124, 255, 0.19));
            border: 1px solid rgba(130, 176, 255, 0.35);
        }
    </style>
</head>
<body>
<div class="app">
    <header class="top">
        <div class="user-row">
            <div id="avatar" class="avatar">?</div>
            <div>
                <h1 id="user-name" class="title">Пользователь</h1>
                <p class="subtitle">GiftMatch • Витрина обмена</p>
            </div>
        </div>
    </header>

    <section id="tab-inventory" class="tab-content active">
        <div class="card">
            <h3 class="card-title">Мой склад</h3>
            <div id="inventory-grid" class="inventory-grid">
                <div class="empty">Загрузка склада...</div>
            </div>
        </div>

        <div class="card">
            <h3 class="card-title">Создать предложение обмена</h3>
            <div class="row">
                <select id="gift-select">
                    <option value="">Что отдаю</option>
                </select>
            </div>
            <div class="row" style="margin-top:8px;">
                <input id="wanted-gift-input" type="text" maxlength="64" placeholder="Что хочу получить">
                <button id="create-listing-btn" class="primary">Опубликовать</button>
            </div>
        </div>
    </section>

    <section id="tab-market" class="tab-content">
        <div class="card">
            <h3 class="card-title">Витрина предложений</h3>
            <div id="market-list"></div>
        </div>
    </section>

    <section id="tab-orders" class="tab-content">
        <div class="card">
            <h3 class="card-title">Мои обмены</h3>
            <div id="orders-list"></div>
        </div>
    </section>
</div>

<nav class="tab-bar">
    <button class="tab-item active" data-tab="inventory">Склад</button>
    <button class="tab-item" data-tab="market">Витрина</button>
    <button class="tab-item" data-tab="orders">Обмены</button>
</nav>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.expand();
        tg.ready();
    }

    const user = tg?.initDataUnsafe?.user || null;
    const userId = user?.id || 0;
    const userLabel = user ? `${user.first_name || ""} ${user.last_name || ""}`.trim() : "Гость";

    const BASE_URL = "http://127.0.0.1:8080";
    const FEE_PER_PARTICIPANT_TON = 0.6;

    const state = {
        gifts: [],
        listings: [],
        orders: []
    };

    function softHaptic(style = "light") {
        try {
            tg?.HapticFeedback?.impactOccurred(style);
        } catch (err) {
            console.debug("Haptic unavailable:", err);
        }
    }

    document.getElementById("user-name").textContent = userLabel;
    document.getElementById("avatar").textContent = (user?.first_name?.[0] || "G").toUpperCase();

    // Global mobile haptic for interactive controls
    document.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof Element)) return;
        if (target.closest("button, .tab-item, [onclick], select")) {
            softHaptic("light");
        }
    });

    document.querySelectorAll(".tab-item").forEach((btn) => {
        btn.addEventListener("click", () => switchTab(btn.dataset.tab, btn));
    });

    document.getElementById("create-listing-btn").addEventListener("click", createListingFromForm);

    function switchTab(tab, el) {
        document.querySelectorAll(".tab-item").forEach((b) => b.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach((c) => c.classList.remove("active"));
        el.classList.add("active");
        document.getElementById(`tab-${tab}`).classList.add("active");
        softHaptic("light");
    }

    function renderInventory() {
        const grid = document.getElementById("inventory-grid");
        const select = document.getElementById("gift-select");
        select.innerHTML = '<option value="">Выбери подарок</option>';

        if (!state.gifts.length) {
            grid.innerHTML = '<div class="empty" style="grid-column:span 2;">Склад пуст. Отправь подарок на аккаунт-склад через бота.</div>';
            return;
        }

        grid.innerHTML = "";
        state.gifts.forEach((gift, idx) => {
            const card = document.createElement("div");
            card.className = "gift-item";
            card.innerHTML = `
                <span class="gift-emoji">🎁</span>
                <p class="gift-name">${escapeHtml(gift)}</p>
                <button onclick="prefillGift(${idx})">Выбрать</button>
            `;
            grid.appendChild(card);

            const option = document.createElement("option");
            option.value = gift;
            option.textContent = gift;
            select.appendChild(option);
        });
    }

    function renderMarket() {
        const root = document.getElementById("market-list");
        if (!state.listings.length) {
            root.innerHTML = '<div class="empty">Пока нет активных предложений.</div>';
            return;
        }

        root.innerHTML = "";
        state.listings.forEach((item, idx) => {
            const div = document.createElement("div");
            div.className = "listing";
            div.innerHTML = `
                <div class="listing-top">
                    <div><b>🎁 Отдает: ${escapeHtml(item.gift_name)}</b></div>
                    <div class="price">Хочет: ${escapeHtml(item.wanted_gift)}</div>
                </div>
                <div class="row">
                    <span class="badge">user: ${item.owner_name}</span>
                    <span class="badge">${item.status}</span>
                </div>
                <div style="margin-top:7px;color:var(--muted);font-size:12px;">
                    Комиссия: ${FEE_PER_PARTICIPANT_TON} TON с каждого участника
                </div>
                <div class="row" style="margin-top:8px;">
                    <button class="success" onclick="requestExchange(${idx})">Предложить обмен</button>
                </div>
            `;
            root.appendChild(div);
        });
    }

    function renderOrders() {
        const root = document.getElementById("orders-list");
        if (!state.orders.length) {
            root.innerHTML = '<div class="empty">Запросов на обмен пока нет.</div>';
            return;
        }

        root.innerHTML = "";
        state.orders.forEach((order) => {
            const div = document.createElement("div");
            div.className = "listing";
            div.innerHTML = `
                <div class="listing-top">
                    <b>Обмен #${order.id}</b>
                    <span class="${order.status === "completed" ? "status-ok" : "status-bad"}">${order.status}</span>
                </div>
                <div>Отдаешь: ${escapeHtml(order.offered_gift)}</div>
                <div>Хочешь получить: ${escapeHtml(order.requested_gift)}</div>
                <div>Владелец оффера: ${escapeHtml(order.owner_name)}</div>
                <div>Твоя комиссия: ${order.fee_per_user_ton} TON</div>
                <div>Общая комиссия сделки: ${order.total_fee_ton} TON</div>
                <div style="color:var(--muted);margin-top:4px;">${new Date(order.created_at).toLocaleString()}</div>
                <div class="row" style="margin-top:8px;">
                    ${renderExchangeActions(order)}
                </div>
            `;
            root.appendChild(div);
        });
    }

    function renderExchangeActions(order) {
        const isOwner = Number(order.owner_id) === Number(userId);
        if (order.status === "pending_owner_reply" && isOwner) {
            return `
                <button onclick="changeExchangeStatus(${order.id}, 'accept')">Принять</button>
                <button onclick="changeExchangeStatus(${order.id}, 'reject')">Отклонить</button>
            `;
        }
        if (order.status === "accepted") {
            return `<button onclick="changeExchangeStatus(${order.id}, 'to_escrow')">Передать в склад</button>`;
        }
        if (order.status === "in_escrow") {
            return `<button class="success" onclick="changeExchangeStatus(${order.id}, 'complete')">Завершить</button>`;
        }
        return "";
    }

    function prefillGift(index) {
        const gift = state.gifts[index];
        if (!gift) return;
        document.getElementById("gift-select").value = gift;
        tg?.HapticFeedback?.selectionChanged?.();
        softHaptic("light");
    }

    async function createListingFromForm() {
        const giftName = document.getElementById("gift-select").value;
        const wantedGift = document.getElementById("wanted-gift-input").value.trim();

        if (!giftName) return tg?.showAlert("Выбери подарок, который отдаешь");
        if (!wantedGift) return tg?.showAlert("Укажи, что хочешь получить в обмен");

        const exists = state.listings.some((x) => x.gift_name === giftName && x.status === "active");
        if (exists) return tg?.showAlert("Этот подарок уже опубликован в витрине");

        try {
            const response = await fetch(`${BASE_URL}/offers`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    owner_id: userId,
                    owner_name: userLabel,
                    gift_name: giftName,
                    wanted_gift: wantedGift
                })
            });
            const data = await response.json();
            if (!response.ok || !data.ok) throw new Error(data.error || "cannot create offer");
            await loadOffers();
            tg?.showPopup({
                title: "Оффер опубликован",
                message: `Отдаешь "${giftName}", хочешь "${wantedGift}"`,
                buttons: [{ type: "ok" }]
            });
        } catch (err) {
            console.error(err);
            tg?.showAlert("Не удалось создать оффер");
        }
    }

    async function requestExchange(index) {
        const listing = state.listings[index];
        if (!listing || listing.status !== "active") return;
        if (listing.owner_id === userId) {
            return tg?.showAlert("Нельзя отправить обмен самому себе");
        }

        try {
            const response = await fetch(`${BASE_URL}/exchanges`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    offer_id: listing.id,
                    requester_id: userId,
                    requester_name: userLabel,
                    fee_per_user_ton: FEE_PER_PARTICIPANT_TON
                })
            });
            const data = await response.json();
            if (!response.ok || !data.ok) throw new Error(data.error || "cannot create exchange");
            await loadMyExchanges();
            tg?.sendData(JSON.stringify({ action: "create_exchange_request", exchange: data.exchange }));
            tg?.showAlert(`Запрос отправлен: ${data.exchange.id}\nКомиссия: ${data.exchange.fee_per_user_ton} TON с каждого`);
        } catch (err) {
            console.error(err);
            tg?.showAlert("Не удалось отправить запрос обмена");
        }
    }

    async function changeExchangeStatus(exchangeId, action) {
        try {
            const response = await fetch(`${BASE_URL}/exchanges/${exchangeId}/status`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ actor_id: userId, action })
            });
            const data = await response.json();
            if (!response.ok || !data.ok) throw new Error(data.error || "cannot update exchange");
            await loadOffers();
            await loadMyExchanges();
            tg?.showAlert(`Статус обновлен: ${data.exchange.status}`);
        } catch (err) {
            console.error(err);
            tg?.showAlert(`Ошибка: ${err.message}`);
        }
    }

    async function loadInventory() {
        try {
            const response = await fetch(`${BASE_URL}/get_gifts?user_id=${userId}`);
            if (!response.ok) throw new Error("Inventory API unavailable");
            const data = await response.json();
            state.gifts = Array.isArray(data.gifts) ? data.gifts : [];
        } catch (err) {
            console.error(err);
            state.gifts = [];
        }
        renderInventory();
    }

    async function loadOffers() {
        try {
            const response = await fetch(`${BASE_URL}/offers`);
            if (!response.ok) throw new Error("offers API unavailable");
            const data = await response.json();
            state.listings = Array.isArray(data.offers) ? data.offers : [];
        } catch {
            state.listings = [];
        }
        renderMarket();
    }

    async function loadMyExchanges() {
        try {
            const response = await fetch(`${BASE_URL}/exchanges?user_id=${userId}`);
            if (!response.ok) throw new Error("exchanges API unavailable");
            const data = await response.json();
            state.orders = Array.isArray(data.exchanges) ? data.exchanges : [];
        } catch {
            state.orders = [];
        }
        renderOrders();
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    loadOffers();
    loadMyExchanges();
    loadInventory();
</script>
</body>
</html>
