<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GiftMatch Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #11172a;
            --bg2: #1b2340;
            --surface: #243052;
            --card: #202b49;
            --line: #3a4c79;
            --text: #f3f7ff;
            --muted: #bcc8e4;
            --primary: #79c0ff;
            --primary-2: #9b8cff;
            --green: #50d9b7;
            --danger: #ff889a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(1000px 600px at 10% -20%, rgba(122, 168, 255, 0.22) 0%, transparent 55%),
                        radial-gradient(900px 550px at 100% -20%, rgba(171, 128, 255, 0.2) 0%, transparent 54%),
                        linear-gradient(180deg, var(--bg2), var(--bg));
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        .app {
            padding-bottom: 82px;
        }

        .top {
            padding: 18px 16px 14px;
            border-bottom: 1px solid rgba(140, 167, 233, 0.22);
            background: linear-gradient(180deg, rgba(40, 53, 88, 0.82), rgba(22, 30, 51, 0.56));
            backdrop-filter: blur(12px);
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: #081425;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            box-shadow: 0 10px 24px rgba(72, 124, 255, 0.34);
        }

        .title {
            font-size: 18px;
            margin: 0;
        }

        .subtitle {
            margin: 2px 0 0;
            color: var(--muted);
            font-size: 12px;
        }

        .tab-content {
            display: none;
            padding: 14px 12px;
        }

        .tab-content.active { display: block; }

        .card {
            background: linear-gradient(180deg, rgba(39, 54, 91, 0.9), rgba(32, 44, 74, 0.92));
            border: 1px solid rgba(125, 154, 218, 0.24);
            border-radius: 18px;
            padding: 13px;
            margin-bottom: 12px;
            box-shadow: 0 12px 28px rgba(2, 8, 19, 0.32);
            transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
        }

        .card:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 34px rgba(2, 10, 24, 0.44);
            border-color: rgba(151, 186, 255, 0.36);
        }

        .card-title {
            margin: 0 0 10px;
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .gift-item {
            border: 1px solid rgba(125, 156, 222, 0.22);
            background: linear-gradient(180deg, rgba(34, 48, 83, 0.96), rgba(29, 40, 69, 0.96));
            border-radius: 14px;
            padding: 10px;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .gift-item:hover {
            transform: translateY(-1px);
            border-color: rgba(156, 194, 255, 0.42);
            box-shadow: 0 12px 22px rgba(6, 12, 25, 0.38);
        }

        .gift-preview {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            border: 1px solid rgba(140, 175, 239, 0.28);
            background: rgba(18, 27, 49, 0.74);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .gift-preview-fallback {
            font-size: 42px;
        }

        .gift-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .gift-name {
            font-size: 13px;
            margin: 0 0 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .gift-sub {
            margin: 0;
            color: #cfdbf5;
            font-size: 12px;
            line-height: 1.45;
            word-break: break-word;
        }

        .gift-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .row {
            display: flex;
            gap: 8px;
        }

        input, select, button {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(126, 158, 224, 0.3);
            background: var(--surface);
            color: var(--text);
            padding: 10px 11px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease, transform 0.1s ease;
        }

        input::placeholder { color: #a9b7d6; }
        input:focus, select:focus {
            border-color: rgba(149, 196, 255, 0.95);
            box-shadow: 0 0 0 3px rgba(120, 185, 255, 0.18);
        }

        button {
            cursor: pointer;
            background: linear-gradient(180deg, #324978, #2a3f68);
            border-color: rgba(129, 170, 245, 0.46);
            box-shadow: 0 8px 16px rgba(9, 16, 30, 0.26);
            transition: transform 0.1s ease, filter 0.18s ease, box-shadow 0.18s ease;
        }
        button:active { transform: translateY(1px) scale(0.99); }
        button:hover { filter: brightness(1.06); box-shadow: 0 12px 20px rgba(9, 16, 30, 0.36); }

        button.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            border-color: rgba(179, 209, 255, 0.82);
            color: #041427;
            font-weight: 700;
        }

        button.success {
            background: linear-gradient(135deg, var(--green), #79e7cf);
            border-color: #96f1db;
            color: #05291b;
            font-weight: 700;
        }

        .listing {
            border: 1px solid rgba(130, 160, 226, 0.2);
            border-radius: 14px;
            padding: 10px;
            background: linear-gradient(180deg, rgba(35, 49, 84, 0.95), rgba(28, 39, 66, 0.97));
            margin-bottom: 8px;
        }

        .listing-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .price {
            font-weight: 700;
            color: #dbe8ff;
        }

        .badge {
            font-size: 11px;
            color: #dce8ff;
            padding: 3px 8px;
            border: 1px solid rgba(128, 159, 224, 0.35);
            border-radius: 999px;
            background: rgba(116, 153, 226, 0.16);
        }

        .empty {
            color: var(--muted);
            text-align: center;
            font-size: 13px;
            padding: 10px 6px;
        }

        .status-ok { color: var(--green); }
        .status-bad { color: var(--danger); }

        .tab-bar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(16, 23, 39, 0.82);
            border-top: 1px solid rgba(124, 154, 219, 0.2);
            backdrop-filter: blur(16px);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 7px 6px 10px;
        }

        .tab-item {
            border: 0;
            background: transparent;
            color: var(--muted);
            padding: 10px 5px;
            border-radius: 12px;
            font-size: 12px;
        }

        .tab-item.active {
            color: var(--text);
            background: linear-gradient(180deg, rgba(118, 174, 255, 0.28), rgba(140, 126, 255, 0.16));
            border: 1px solid rgba(152, 194, 255, 0.35);
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
                animation: none !important;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <header class="top">
        <div class="user-row">
            <div id="avatar" class="avatar">?</div>
            <div>
                <h1 id="user-name" class="title">Пользователь</h1>
                <p class="subtitle">GiftMatch • Витрина обмена</p>
            </div>
        </div>
    </header>

    <section id="tab-inventory" class="tab-content active">
        <div class="card">
            <h3 class="card-title">Мой склад</h3>
            <div id="inventory-grid" class="inventory-grid">
                <div class="empty">Загрузка склада...</div>
            </div>
        </div>

        <div class="card">
            <h3 class="card-title">Мои заявки на вывод</h3>
            <div id="withdrawals-list" class="empty">Загрузка заявок...</div>
        </div>

        <div class="card">
            <h3 class="card-title">Создать предложение обмена</h3>
            <div class="row">
                <select id="gift-select">
                    <option value="">Что отдаю</option>
                </select>
            </div>
            <div class="row" style="margin-top:8px;">
                <input id="wanted-gift-input" type="text" maxlength="64" placeholder="Что хочу получить">
                <button id="create-listing-btn" class="primary">Опубликовать</button>
            </div>
        </div>
    </section>

    <section id="tab-market" class="tab-content">
        <div class="card">
            <h3 class="card-title">Витрина предложений</h3>
            <div class="row" style="margin-bottom:8px;">
                <input id="market-search-input" type="text" maxlength="64" placeholder="Поиск: подарок или пользователь">
            </div>
            <div class="row" style="margin-bottom:8px;">
                <input id="market-model-filter" type="text" list="market-model-options" maxlength="64" placeholder="Фильтр по модели">
                <datalist id="market-model-options"></datalist>
            </div>
            <div class="row" style="margin-bottom:8px;">
                <input id="market-pattern-filter" type="text" list="market-pattern-options" maxlength="64" placeholder="Фильтр по узору">
                <datalist id="market-pattern-options"></datalist>
                <input id="market-background-filter" type="text" list="market-background-options" maxlength="64" placeholder="Фильтр по фону">
                <datalist id="market-background-options"></datalist>
            </div>
            <div id="market-list"></div>
        </div>
    </section>

    <section id="tab-orders" class="tab-content">
        <div class="card">
            <h3 class="card-title">Мои обмены</h3>
            <div id="orders-list"></div>
        </div>
    </section>
</div>

<nav class="tab-bar">
    <button class="tab-item active" data-tab="inventory">Склад</button>
    <button class="tab-item" data-tab="market">Витрина</button>
    <button class="tab-item" data-tab="orders">Обмены</button>
</nav>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.expand();
        tg.ready();
    }

    const user = tg?.initDataUnsafe?.user || null;
    const userId = user?.id || 0;
    const userLabel = user ? `${user.first_name || ""} ${user.last_name || ""}`.trim() : "Гость";

    const BASE_URL = "http://127.0.0.1:8080";
    const FEE_PER_PARTICIPANT_TON = 0.6;

    const state = {
        gifts: [],
        listings: [],
        orders: [],
        withdrawals: [],
        marketSearch: "",
        marketFilters: {
            model: "",
            pattern: "",
            background: ""
        }
    };

    const GIFT_PRESETS = [
        { match: /star.?gift.?unique/i, icon: "💎", title: "Уникальный Telegram Gift" },
        { match: /star.?gift/i, icon: "⭐", title: "Star Gift" },
        { match: /premium/i, icon: "👑", title: "Premium Gift" },
        { match: /unique/i, icon: "💠", title: "Уникальный подарок" },
        { match: /gift/i, icon: "🎁", title: "Telegram Gift" }
    ];

    function softHaptic(style = "light") {
        try {
            tg?.HapticFeedback?.impactOccurred(style);
        } catch (err) {
            console.debug("Haptic unavailable:", err);
        }
    }

    document.getElementById("user-name").textContent = userLabel;
    document.getElementById("avatar").textContent = (user?.first_name?.[0] || "G").toUpperCase();

    // Global mobile haptic for interactive controls
    document.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof Element)) return;
        if (target.closest("button, .tab-item, [onclick], select")) {
            softHaptic("light");
        }
    });

    document.querySelectorAll(".tab-item").forEach((btn) => {
        btn.addEventListener("click", () => switchTab(btn.dataset.tab, btn));
    });

    document.getElementById("create-listing-btn").addEventListener("click", createListingFromForm);
    document.getElementById("market-search-input").addEventListener("input", (event) => {
        state.marketSearch = String(event?.target?.value || "").trim().toLowerCase();
        renderMarket();
    });
    document.getElementById("market-model-filter").addEventListener("input", (event) => {
        state.marketFilters.model = String(event?.target?.value || "").trim().toLowerCase();
        renderMarket();
    });
    document.getElementById("market-pattern-filter").addEventListener("input", (event) => {
        state.marketFilters.pattern = String(event?.target?.value || "").trim().toLowerCase();
        renderMarket();
    });
    document.getElementById("market-background-filter").addEventListener("input", (event) => {
        state.marketFilters.background = String(event?.target?.value || "").trim().toLowerCase();
        renderMarket();
    });

    function switchTab(tab, el) {
        document.querySelectorAll(".tab-item").forEach((b) => b.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach((c) => c.classList.remove("active"));
        el.classList.add("active");
        document.getElementById(`tab-${tab}`).classList.add("active");
        softHaptic("light");
    }

    function renderInventory() {
        const grid = document.getElementById("inventory-grid");
        const select = document.getElementById("gift-select");
        select.innerHTML = '<option value="">Выбери подарок</option>';

        if (!state.gifts.length) {
            grid.innerHTML = '<div class="empty" style="grid-column:span 2;">Склад пуст. Отправь подарок на аккаунт-склад через бота.</div>';
            return;
        }

        grid.innerHTML = "";
        state.gifts.forEach((gift, idx) => {
            const pretty = prettifyGift(gift);
            const card = document.createElement("div");
            card.className = "gift-item";
            card.innerHTML = `
                <span class="gift-preview">
                    ${pretty.image
                        ? `<img src="${escapeHtml(resolveImageUrl(pretty.image))}" alt="${escapeHtml(pretty.title)}" />`
                        : `<span class="gift-preview-fallback">${pretty.icon}</span>`
                    }
                </span>
                <p class="gift-name">${escapeHtml(pretty.title)}</p>
                ${pretty.model ? `<p class="gift-sub">Модель: <b>${escapeHtml(pretty.model)}</b></p>` : ""}
                ${pretty.pattern ? `<p class="gift-sub">Узор: <b>${escapeHtml(pretty.pattern)}</b></p>` : ""}
                ${pretty.background ? `<p class="gift-sub">Фон: <b>${escapeHtml(pretty.background)}</b></p>` : ""}
                <div class="gift-actions">
                    <button onclick="prefillGift(${idx})">Выбрать</button>
                    <button onclick="withdrawGift(${Number(gift?.id || 0)}, '${escapeHtml(pretty.title)}')">Вывод</button>
                </div>
            `;
            grid.appendChild(card);

            const option = document.createElement("option");
            option.value = pretty.rawName;
            option.textContent = `${pretty.icon} ${pretty.title}`;
            select.appendChild(option);
        });
    }

    function renderMarket() {
        const root = document.getElementById("market-list");
        if (!state.listings.length) {
            root.innerHTML = '<div class="empty">Пока нет активных предложений.</div>';
            return;
        }

        const query = state.marketSearch;
        const filters = state.marketFilters;
        const filtered = state.listings.filter((item) => {
            const give = prettifyGift(item.gift_name);
            const want = prettifyGift(item.wanted_gift);
            const modelValues = [give.model, want.model].map((v) => String(v || "").toLowerCase());
            const patternValues = [give.pattern, want.pattern].map((v) => String(v || "").toLowerCase());
            const backgroundValues = [give.background, want.background].map((v) => String(v || "").toLowerCase());

            if (filters.model && !modelValues.some((v) => v.includes(filters.model))) return false;
            if (filters.pattern && !patternValues.some((v) => v.includes(filters.pattern))) return false;
            if (filters.background && !backgroundValues.some((v) => v.includes(filters.background))) return false;

            if (!query) return true;
            const haystack = [
                give.title,
                give.rawName,
                want.title,
                want.rawName,
                give.model,
                give.pattern,
                give.background,
                want.model,
                want.pattern,
                want.background,
                item.owner_name,
                item.status,
            ]
                .map((v) => String(v || "").toLowerCase())
                .join(" ");
            return haystack.includes(query);
        });

        if (!filtered.length) {
            root.innerHTML = '<div class="empty">По запросу ничего не найдено.</div>';
            return;
        }

        root.innerHTML = "";
        filtered.forEach((item) => {
            const give = prettifyGift(item.gift_name);
            const want = prettifyGift(item.wanted_gift);
            const div = document.createElement("div");
            div.className = "listing";
            div.innerHTML = `
                <div class="listing-top">
                    <div><b>${give.icon} Отдает: ${escapeHtml(give.title)}</b></div>
                    <div class="price">${want.icon} Хочет: ${escapeHtml(want.title)}</div>
                </div>
                <div class="row">
                    <span class="badge">user: ${item.owner_name}</span>
                    <span class="badge">${item.status}</span>
                </div>
                <div style="margin-top:7px;color:var(--muted);font-size:12px;">
                    Комиссия: ${FEE_PER_PARTICIPANT_TON} TON с каждого участника
                </div>
                <div class="row" style="margin-top:8px;">
                    <button class="success" onclick="requestExchangeById(${Number(item.id)})">Предложить обмен</button>
                    ${Number(item.owner_id) === Number(userId) ? `<button onclick="removeOffer(${item.id})">Убрать</button>` : ""}
                </div>
            `;
            root.appendChild(div);
        });
    }

    function fillFilterDatalist(datalistId, values) {
        const datalist = document.getElementById(datalistId);
        if (!datalist) return;
        datalist.innerHTML = "";
        values.forEach((value) => {
            const option = document.createElement("option");
            option.value = value;
            datalist.appendChild(option);
        });
    }

    function refreshMarketFilterOptions() {
        const modelSet = new Set();
        const patternSet = new Set();
        const backgroundSet = new Set();

        const collectFromPretty = (pretty) => {
            const model = String(pretty?.model || "").trim();
            const pattern = String(pretty?.pattern || "").trim();
            const background = String(pretty?.background || "").trim();
            if (model) modelSet.add(model);
            if (pattern) patternSet.add(pattern);
            if (background) backgroundSet.add(background);
        };

        state.gifts.forEach((gift) => collectFromPretty(prettifyGift(gift)));
        state.listings.forEach((item) => {
            collectFromPretty(prettifyGift(item.gift_name));
            collectFromPretty(prettifyGift(item.wanted_gift));
        });

        const sortFn = (a, b) => a.localeCompare(b, "ru");
        fillFilterDatalist("market-model-options", Array.from(modelSet).sort(sortFn));
        fillFilterDatalist("market-pattern-options", Array.from(patternSet).sort(sortFn));
        fillFilterDatalist("market-background-options", Array.from(backgroundSet).sort(sortFn));
    }

    function renderOrders() {
        const root = document.getElementById("orders-list");
        if (!state.orders.length) {
            root.innerHTML = '<div class="empty">Запросов на обмен пока нет.</div>';
            return;
        }

        root.innerHTML = "";
        state.orders.forEach((order) => {
            const offered = prettifyGift(order.offered_gift);
            const requested = prettifyGift(order.requested_gift);
            const div = document.createElement("div");
            div.className = "listing";
            div.innerHTML = `
                <div class="listing-top">
                    <b>Обмен #${order.id}</b>
                    <span class="${order.status === "completed" ? "status-ok" : "status-bad"}">${order.status}</span>
                </div>
                <div>${offered.icon} Отдаешь: ${escapeHtml(offered.title)}</div>
                <div>${requested.icon} Хочешь получить: ${escapeHtml(requested.title)}</div>
                <div>Владелец оффера: ${escapeHtml(order.owner_name)}</div>
                <div>Твоя комиссия: ${order.fee_per_user_ton} TON</div>
                <div>Общая комиссия сделки: ${order.total_fee_ton} TON</div>
                <div style="color:var(--muted);margin-top:4px;">${new Date(order.created_at).toLocaleString()}</div>
                <div class="row" style="margin-top:8px;">
                    ${renderExchangeActions(order)}
                </div>
            `;
            root.appendChild(div);
        });
    }

    function renderExchangeActions(order) {
        const isOwner = Number(order.owner_id) === Number(userId);
        if (order.status === "pending_owner_reply" && isOwner) {
            return `
                <button onclick="changeExchangeStatus(${order.id}, 'accept')">Принять</button>
                <button onclick="changeExchangeStatus(${order.id}, 'reject')">Отклонить</button>
            `;
        }
        if (order.status === "accepted") {
            return `<button onclick="changeExchangeStatus(${order.id}, 'to_escrow')">Передать в склад</button>`;
        }
        if (order.status === "in_escrow") {
            return `<button class="success" onclick="changeExchangeStatus(${order.id}, 'complete')">Завершить</button>`;
        }
        return "";
    }

    function renderWithdrawals() {
        const root = document.getElementById("withdrawals-list");
        if (!state.withdrawals.length) {
            root.innerHTML = '<div class="empty">Заявок на вывод пока нет.</div>';
            return;
        }

        root.innerHTML = "";
        state.withdrawals.forEach((item) => {
            const statusMap = {
                pending: "Ожидает обработки",
                processing: "В обработке",
                completed: "Завершено",
                rejected: "Отклонено"
            };
            const statusText = statusMap[item.status] || item.status;
            const statusClass = item.status === "completed" ? "status-ok" : (item.status === "rejected" ? "status-bad" : "");
            const pretty = prettifyGift({ name: item.gift_name, image: item.gift_image });

            const card = document.createElement("div");
            card.className = "listing";
            card.innerHTML = `
                <div class="listing-top">
                    <b>Заявка #${item.id}</b>
                    <span class="${statusClass}">${escapeHtml(statusText)}</span>
                </div>
                <div>${pretty.icon} ${escapeHtml(pretty.title)}</div>
                <div style="color:var(--muted);font-size:12px;">Комиссия: ${Number(item.fee_stars || 0)}⭐</div>
                <div style="color:var(--muted);font-size:12px;">${new Date(item.created_at).toLocaleString()}</div>
            `;
            root.appendChild(card);
        });
    }

    function prefillGift(index) {
        const gift = prettifyGift(state.gifts[index]);
        if (!gift.rawName) return;
        document.getElementById("gift-select").value = gift.rawName;
        tg?.HapticFeedback?.selectionChanged?.();
        softHaptic("light");
    }

    async function createListingFromForm() {
        const giftName = document.getElementById("gift-select").value;
        const wantedGift = document.getElementById("wanted-gift-input").value.trim();

        if (!giftName) return tg?.showAlert("Выбери подарок, который отдаешь");
        if (!wantedGift) return tg?.showAlert("Укажи, что хочешь получить в обмен");

        const exists = state.listings.some((x) => x.gift_name === giftName && x.status === "active");
        if (exists) return tg?.showAlert("Этот подарок уже опубликован в витрине");

        try {
            const response = await fetch(`${BASE_URL}/offers`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    owner_id: userId,
                    owner_name: userLabel,
                    gift_name: giftName,
                    wanted_gift: wantedGift
                })
            });
            const data = await response.json();
            if (!response.ok || !data.ok) throw new Error(data.error || "cannot create offer");
            await loadOffers();
            tg?.showPopup({
                title: "Оффер опубликован",
                message: `Отдаешь "${giftName}", хочешь "${wantedGift}"`,
                buttons: [{ type: "ok" }]
            });
        } catch (err) {
            console.error(err);
            tg?.showAlert("Не удалось создать оффер");
        }
    }

    async function requestExchange(index) {
        const listing = state.listings[index];
        if (!listing || listing.status !== "active") return;
        if (listing.owner_id === userId) {
            return tg?.showAlert("Нельзя отправить обмен самому себе");
        }

        try {
            const response = await fetch(`${BASE_URL}/exchanges`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    offer_id: listing.id,
                    requester_id: userId,
                    requester_name: userLabel,
                    fee_per_user_ton: FEE_PER_PARTICIPANT_TON
                })
            });
            const data = await response.json();
            if (!response.ok || !data.ok) throw new Error(data.error || "cannot create exchange");
            await loadMyExchanges();
            tg?.sendData(JSON.stringify({ action: "create_exchange_request", exchange: data.exchange }));
            tg?.showAlert(`Запрос отправлен: ${data.exchange.id}\nКомиссия: ${data.exchange.fee_per_user_ton} TON с каждого`);
        } catch (err) {
            console.error(err);
            tg?.showAlert("Не удалось отправить запрос обмена");
        }
    }

    async function requestExchangeById(offerId) {
        const index = state.listings.findIndex((item) => Number(item.id) === Number(offerId));
        if (index < 0) {
            tg?.showAlert("Оффер не найден. Обнови витрину.");
            return;
        }
        await requestExchange(index);
    }

    async function removeOffer(offerId) {
        try {
            const response = await fetch(`${BASE_URL}/offers/${offerId}/remove`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ actor_id: userId })
            });
            const data = await response.json();
            if (!response.ok || !data.ok) throw new Error(data.error || "cannot remove offer");
            await loadOffers();
            tg?.showAlert("Предложение убрано с витрины");
        } catch (err) {
            console.error(err);
            tg?.showAlert(`Не удалось убрать оффер: ${err.message}`);
        }
    }

    async function askWithdrawConfirm(giftTitle) {
        if (!tg || !tg.showPopup) {
            return confirm(`Создать заявку на вывод "${giftTitle}"?\nКомиссия передачи: 25⭐`);
        }
        return new Promise((resolve) => {
            tg.showPopup(
                {
                    title: "Вывод подарка",
                    message: `Создать заявку на вывод "${giftTitle}"?\nКомиссия передачи: 25⭐`,
                    buttons: [
                        { id: "cancel", type: "cancel", text: "Отмена" },
                        { id: "ok", type: "default", text: "Создать заявку" }
                    ]
                },
                (buttonId) => resolve(buttonId === "ok")
            );
        });
    }

    async function withdrawGift(giftId, giftTitle) {
        if (!giftId) return tg?.showAlert("Нельзя вывести: отсутствует ID подарка");
        const proceed = await askWithdrawConfirm(giftTitle);
        if (!proceed) return;

        try {
            const response = await fetch(`${BASE_URL}/withdraw_gift`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_id: userId, gift_id: giftId })
            });
            const data = await response.json();
            if (!response.ok || !data.ok) {
                if (data?.error === "already_requested") {
                    return tg?.showAlert("Заявка на вывод уже создана и ждет обработки.");
                }
                throw new Error(data?.error || "withdraw failed");
            }
            await loadInventory();
            await loadWithdrawals();
            tg?.showAlert(
                `Заявка на вывод создана.\nID: ${data.withdraw_request_id}\nСтатус: ${data.withdraw_status || "pending"}`
            );
        } catch (err) {
            console.error(err);
            tg?.showAlert(`Не удалось создать заявку на вывод: ${err.message}`);
        }
    }

    async function changeExchangeStatus(exchangeId, action) {
        try {
            const response = await fetch(`${BASE_URL}/exchanges/${exchangeId}/status`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ actor_id: userId, action })
            });
            const data = await response.json();
            if (!response.ok || !data.ok) throw new Error(data.error || "cannot update exchange");
            await loadOffers();
            await loadMyExchanges();
            tg?.showAlert(`Статус обновлен: ${data.exchange.status}`);
        } catch (err) {
            console.error(err);
            tg?.showAlert(`Ошибка: ${err.message}`);
        }
    }

    async function loadInventory() {
        try {
            const response = await fetch(`${BASE_URL}/get_gifts?user_id=${userId}`);
            if (!response.ok) throw new Error("Inventory API unavailable");
            const data = await response.json();
            state.gifts = Array.isArray(data.gifts) ? data.gifts : [];
        } catch (err) {
            console.error(err);
            state.gifts = [];
        }
        refreshMarketFilterOptions();
        renderInventory();
    }

    async function loadWithdrawals() {
        try {
            const response = await fetch(`${BASE_URL}/withdrawals?user_id=${userId}`);
            if (!response.ok) throw new Error("withdrawals API unavailable");
            const data = await response.json();
            state.withdrawals = Array.isArray(data.withdrawals) ? data.withdrawals : [];
        } catch (err) {
            console.error(err);
            state.withdrawals = [];
        }
        renderWithdrawals();
    }

    async function loadOffers() {
        try {
            const response = await fetch(`${BASE_URL}/offers`);
            if (!response.ok) throw new Error("offers API unavailable");
            const data = await response.json();
            state.listings = Array.isArray(data.offers) ? data.offers : [];
        } catch {
            state.listings = [];
        }
        refreshMarketFilterOptions();
        renderMarket();
    }

    async function loadMyExchanges() {
        try {
            const response = await fetch(`${BASE_URL}/exchanges?user_id=${userId}`);
            if (!response.ok) throw new Error("exchanges API unavailable");
            const data = await response.json();
            state.orders = Array.isArray(data.exchanges) ? data.exchanges : [];
        } catch {
            state.orders = [];
        }
        renderOrders();
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    function resolveImageUrl(imagePath) {
        const raw = String(imagePath || "").trim();
        if (!raw) return "";
        if (raw.startsWith("http://") || raw.startsWith("https://")) return raw;
        if (raw.startsWith("/")) return `${BASE_URL}${raw}`;
        return `${BASE_URL}/${raw}`;
    }

    function normalizeGiftInput(giftInput) {
        if (typeof giftInput === "string") {
            return { rawName: giftInput, rawImage: "" };
        }
        if (!giftInput || typeof giftInput !== "object") {
            return { rawName: "", rawImage: "" };
        }

        const image =
            giftInput.image ||
            giftInput.gift_image ||
            giftInput.fragment_image ||
            "";

        const title =
            giftInput.title ??
            "";
        const model =
            giftInput.model ??
            "";
        const pattern =
            giftInput.pattern ??
            "";
        const background =
            giftInput.background ??
            "";

        let nameCandidate =
            giftInput.name ??
            giftInput.gift_name ??
            giftInput.title ??
            giftInput.gift ??
            "";

        if (nameCandidate && typeof nameCandidate === "object") {
            nameCandidate =
                nameCandidate.name ??
                nameCandidate.title ??
                nameCandidate.id ??
                "";
        }

        const rawName = String(nameCandidate || "");
        return {
            rawName,
            rawImage: String(image || ""),
            title: String(title || ""),
            model: String(model || ""),
            pattern: String(pattern || ""),
            background: String(background || "")
        };
    }

    function prettifyGift(giftInput) {
        const normalizedInput = normalizeGiftInput(giftInput);
        const rawName = normalizedInput.rawName;
        const rawImage = normalizedInput.rawImage;
        const metaTitle = normalizedInput.title;
        const metaModel = normalizedInput.model;
        const metaPattern = normalizedInput.pattern;
        const metaBackground = normalizedInput.background;
        const raw = rawName.trim();
        const normalized = raw
            .replaceAll("_", " ")
            .replaceAll("-", " ")
            .replace("MessageAction", "")
            .replace("StarGiftUnique", "Уникальный Star Gift")
            .replace("StarGift", "Star Gift")
            .replace("GiftUnique", "Уникальный Gift")
            .replace("Gift", "Gift")
            .replace(/\s+/g, " ")
            .trim();

        for (const preset of GIFT_PRESETS) {
            if (preset.match.test(raw) || preset.match.test(normalized)) {
                // If payload contains a readable title, keep it.
                const readable = metaTitle || (normalized && normalized.length > 3 ? normalized : preset.title);
                return {
                    icon: preset.icon,
                    title: readable,
                    image: rawImage,
                    rawName: raw,
                    model: metaModel,
                    pattern: metaPattern,
                    background: metaBackground
                };
            }
        }

        const fallbackTitle = metaTitle || normalized || "Telegram Gift";
        return {
            icon: "🎁",
            title: fallbackTitle,
            image: rawImage,
            rawName: raw,
            model: metaModel,
            pattern: metaPattern,
            background: metaBackground
        };
    }

    loadOffers();
    loadMyExchanges();
    loadInventory();
    loadWithdrawals();
</script>
</body>
</html>
