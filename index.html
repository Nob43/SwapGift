<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GiftMatch Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #11172a;
            --bg2: #1b2340;
            --surface: #243052;
            --card: #202b49;
            --line: #3a4c79;
            --text: #f3f7ff;
            --muted: #bcc8e4;
            --primary: #79c0ff;
            --primary-2: #9b8cff;
            --green: #50d9b7;
            --danger: #ff889a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(1000px 600px at 10% -20%, rgba(122, 168, 255, 0.22) 0%, transparent 55%),
                        radial-gradient(900px 550px at 100% -20%, rgba(171, 128, 255, 0.2) 0%, transparent 54%),
                        linear-gradient(180deg, var(--bg2), var(--bg));
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body.boot-loading {
            overflow: hidden;
        }

        .boot-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(900px 540px at 12% -16%, rgba(122, 168, 255, 0.2) 0%, transparent 54%),
                        radial-gradient(860px 520px at 100% -16%, rgba(171, 128, 255, 0.18) 0%, transparent 53%),
                        linear-gradient(180deg, var(--bg2), var(--bg));
            opacity: 1;
            visibility: visible;
            transition: opacity 0.28s ease, visibility 0.28s ease;
        }

        .boot-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .boot-card {
            width: min(320px, calc(100vw - 36px));
            padding: 20px 18px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid rgba(125, 154, 218, 0.24);
            background: linear-gradient(180deg, rgba(39, 54, 91, 0.92), rgba(32, 44, 74, 0.95));
            box-shadow: 0 16px 32px rgba(2, 8, 19, 0.42);
        }

        .boot-spinner {
            width: 30px;
            height: 30px;
            margin: 0 auto 10px;
            border-radius: 50%;
            border: 2px solid rgba(162, 191, 255, 0.25);
            border-top-color: var(--primary);
            animation: spin 0.85s linear infinite;
        }

        .boot-title {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
        }

        .boot-subtitle {
            margin: 6px 0 0;
            font-size: 12px;
            color: var(--muted);
        }

        .app {
            padding-bottom: 82px;
        }

        .top {
            padding: 18px 16px 14px;
            border-bottom: 1px solid rgba(140, 167, 233, 0.22);
            background: linear-gradient(180deg, rgba(40, 53, 88, 0.82), rgba(22, 30, 51, 0.56));
            backdrop-filter: blur(12px);
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: #081425;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            box-shadow: 0 10px 24px rgba(72, 124, 255, 0.34);
        }

        .title {
            font-size: 18px;
            margin: 0;
        }

        .subtitle {
            margin: 2px 0 0;
            color: var(--muted);
            font-size: 12px;
        }

        .tab-content {
            display: none;
            padding: 14px 12px;
        }

        .tab-content.active { display: block; }

        .card {
            background: linear-gradient(180deg, rgba(39, 54, 91, 0.9), rgba(32, 44, 74, 0.92));
            border: 1px solid rgba(125, 154, 218, 0.24);
            border-radius: 18px;
            padding: 13px;
            margin-bottom: 12px;
            box-shadow: 0 12px 28px rgba(2, 8, 19, 0.32);
            transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
        }

        .card:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 34px rgba(2, 10, 24, 0.44);
            border-color: rgba(151, 186, 255, 0.36);
        }

        .card-title {
            margin: 0 0 10px;
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .gift-item {
            border: 1px solid rgba(125, 156, 222, 0.22);
            background: linear-gradient(180deg, rgba(34, 48, 83, 0.96), rgba(29, 40, 69, 0.96));
            border-radius: 14px;
            padding: 10px;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .gift-item:hover {
            transform: translateY(-1px);
            border-color: rgba(156, 194, 255, 0.42);
            box-shadow: 0 12px 22px rgba(6, 12, 25, 0.38);
        }

        .gift-preview {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            border: 1px solid rgba(140, 175, 239, 0.28);
            background: rgba(18, 27, 49, 0.74);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .gift-preview-fallback {
            font-size: 42px;
        }

        .gift-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .gift-name {
            font-size: 13px;
            margin: 0 0 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .gift-sub {
            margin: 0;
            color: #cfdbf5;
            font-size: 12px;
            line-height: 1.45;
            word-break: break-word;
        }

        .gift-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .row {
            display: flex;
            gap: 8px;
        }

        input, select, button {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(126, 158, 224, 0.3);
            background: var(--surface);
            color: var(--text);
            padding: 10px 11px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease, transform 0.1s ease;
        }

        input::placeholder { color: #a9b7d6; }
        input:focus, select:focus {
            border-color: rgba(149, 196, 255, 0.95);
            box-shadow: 0 0 0 3px rgba(120, 185, 255, 0.18);
        }

        button {
            cursor: pointer;
            background: linear-gradient(180deg, #324978, #2a3f68);
            border-color: rgba(129, 170, 245, 0.46);
            box-shadow: 0 8px 16px rgba(9, 16, 30, 0.26);
            transition: transform 0.1s ease, filter 0.18s ease, box-shadow 0.18s ease;
        }
        button:active { transform: translateY(1px) scale(0.99); }
        button:hover { filter: brightness(1.06); box-shadow: 0 12px 20px rgba(9, 16, 30, 0.36); }

        button.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            border-color: rgba(179, 209, 255, 0.82);
            color: #041427;
            font-weight: 700;
        }

        button.success {
            background: linear-gradient(135deg, var(--green), #79e7cf);
            border-color: #96f1db;
            color: #05291b;
            font-weight: 700;
        }

        .listing {
            border: 1px solid rgba(130, 160, 226, 0.2);
            border-radius: 14px;
            padding: 10px;
            background: linear-gradient(180deg, rgba(35, 49, 84, 0.95), rgba(28, 39, 66, 0.97));
            margin-bottom: 8px;
        }

        .listing-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .price {
            font-weight: 700;
            color: #dbe8ff;
        }

        .badge {
            font-size: 11px;
            color: #dce8ff;
            padding: 3px 8px;
            border: 1px solid rgba(128, 159, 224, 0.35);
            border-radius: 999px;
            background: rgba(116, 153, 226, 0.16);
        }

        .empty {
            color: var(--muted);
            text-align: center;
            font-size: 13px;
            padding: 10px 6px;
        }

        .status-ok { color: var(--green); }
        .status-bad { color: var(--danger); }

        .tab-bar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(16, 23, 39, 0.82);
            border-top: 1px solid rgba(124, 154, 219, 0.2);
            backdrop-filter: blur(16px);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 7px 6px 10px;
        }

        .tab-item {
            border: 0;
            background: transparent;
            color: var(--muted);
            padding: 10px 5px;
            border-radius: 12px;
            font-size: 12px;
        }

        .tab-item.active {
            color: var(--text);
            background: linear-gradient(180deg, rgba(118, 174, 255, 0.28), rgba(140, 126, 255, 0.16));
            border: 1px solid rgba(152, 194, 255, 0.35);
        }

        .filter-trigger {
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .picker-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 10, 20, 0.56);
            backdrop-filter: blur(4px);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 1100;
            padding: 12px;
        }

        .picker-overlay.open {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        .picker-panel {
            width: min(640px, 100%);
            max-height: 78vh;
            overflow: auto;
            border-radius: 16px;
            border: 1px solid rgba(136, 171, 240, 0.35);
            background: linear-gradient(180deg, rgba(36, 50, 85, 0.98), rgba(25, 35, 60, 0.98));
            box-shadow: 0 20px 38px rgba(2, 8, 19, 0.55);
            padding: 12px;
            animation: slideUp 0.22s ease;
        }

        .picker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .picker-header h4 {
            margin: 0;
            font-size: 14px;
        }

        .picker-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        .picker-item {
            width: 100%;
            text-align: left;
            border: 1px solid rgba(128, 159, 224, 0.35);
            background: rgba(115, 153, 224, 0.14);
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 12px;
            color: var(--text);
        }

        .picker-item-content {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .picker-item-icon {
            width: 18px;
            height: 18px;
            border-radius: 6px;
            border: 1px solid rgba(138, 171, 235, 0.35);
            background: rgba(17, 28, 50, 0.8);
            overflow: hidden;
            flex: 0 0 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--muted);
        }

        .picker-item-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .picker-item-label {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .picker-item.active {
            border-color: rgba(157, 206, 255, 0.7);
            background: rgba(110, 180, 255, 0.24);
        }

        .gift-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(4, 8, 18, 0.68);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1200;
            padding: 14px;
        }

        .gift-modal-overlay.open {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        .gift-modal {
            width: min(520px, 100%);
            max-height: 86vh;
            overflow: auto;
            border-radius: 18px;
            border: 1px solid rgba(147, 184, 255, 0.38);
            background: linear-gradient(180deg, rgba(39, 54, 91, 0.98), rgba(28, 39, 66, 0.98));
            box-shadow: 0 22px 48px rgba(1, 6, 18, 0.56);
            padding: 14px;
            animation: slideUp 0.22s ease;
        }

        .gift-modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .gift-modal-title {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
        }

        .gift-modal-subtitle {
            margin-top: 2px;
            color: var(--muted);
            font-size: 12px;
        }

        #gift-modal-close-btn {
            width: 28px;
            height: 28px;
            border-radius: 999px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            line-height: 1;
            font-weight: 600;
            background: rgba(13, 21, 38, 0.72);
            border: 1px solid rgba(142, 177, 244, 0.35);
            color: var(--text);
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        #gift-modal-close-btn:hover {
            background: rgba(28, 40, 67, 0.9);
            border-color: rgba(142, 177, 244, 0.55);
            transform: translateY(-1px);
        }

        .gift-modal-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(142, 177, 244, 0.35);
            background: rgba(13, 21, 38, 0.72);
            margin-bottom: 12px;
        }

        .gift-modal-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .gift-modal-info {
            display: grid;
            gap: 6px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .gift-modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(12px); opacity: 0.7; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
                animation: none !important;
            }
        }
    </style>
</head>
<body>
<div id="boot-overlay" class="boot-overlay">
    <div class="boot-card">
        <div class="boot-spinner" aria-hidden="true"></div>
        <h3 class="boot-title">Загрузка GiftMatch</h3>
        <p class="boot-subtitle">Подготавливаем склад, витрину и фильтры...</p>
    </div>
</div>
<div class="app">
    <header class="top">
        <div class="user-row">
            <div id="avatar" class="avatar">?</div>
            <div>
                <h1 id="user-name" class="title">Пользователь</h1>
            </div>
        </div>
    </header>

    <section id="tab-inventory" class="tab-content active">
        <div class="card">
            <h3 class="card-title">Мой склад</h3>
            <div id="inventory-grid" class="inventory-grid">
                <div class="empty">Загрузка склада...</div>
            </div>
        </div>

        <div class="card">
            <h3 class="card-title">Мои заявки на вывод</h3>
            <div id="withdrawals-list" class="empty">Загрузка заявок...</div>
        </div>

        <div class="card">
            <h3 class="card-title">Создать предложение обмена</h3>
            <div class="row">
                <select id="gift-select">
                    <option value="">Что отдаю</option>
                </select>
            </div>
            <div class="row" style="margin-top:8px;">
                <input id="wanted-gift-input" type="text" maxlength="64" placeholder="Что хочу получить">
                <button id="create-listing-btn" class="primary">Опубликовать</button>
            </div>
        </div>
    </section>

    <section id="tab-market" class="tab-content">
        <div class="card">
            <h3 class="card-title">Витрина предложений</h3>
            <div class="row" style="margin-bottom:8px;">
                <input id="market-search-input" type="text" maxlength="64" placeholder="Поиск: подарок или пользователь">
            </div>
            <div class="row" style="margin-bottom:8px;">
                <button id="market-model-filter-btn" class="filter-trigger" type="button">Модель: Все</button>
            </div>
            <div class="row" style="margin-bottom:8px;">
                <button id="market-pattern-filter-btn" class="filter-trigger" type="button">Узор: Все</button>
                <button id="market-background-filter-btn" class="filter-trigger" type="button">Фон: Все</button>
            </div>
            <div id="market-list"></div>
        </div>
    </section>

    <section id="tab-orders" class="tab-content">
        <div class="card">
            <h3 class="card-title">Мои обмены</h3>
            <div id="orders-list"></div>
        </div>
    </section>
</div>

<div id="filter-picker-overlay" class="picker-overlay">
    <div class="picker-panel">
        <div class="picker-header">
            <h4 id="filter-picker-title">Выбор</h4>
            <button id="filter-picker-close-btn" type="button">Закрыть</button>
        </div>
        <div class="row">
            <input id="filter-picker-search" type="text" maxlength="64" placeholder="Поиск значения">
            <button id="filter-picker-reset-btn" type="button">Сброс</button>
        </div>
        <div id="filter-picker-list" class="picker-list"></div>
    </div>
</div>

<div id="gift-modal-overlay" class="gift-modal-overlay">
    <div class="gift-modal">
        <div class="gift-modal-head">
            <div>
                <h4 id="gift-modal-title" class="gift-modal-title">Подарок</h4>
                <div id="gift-modal-subtitle" class="gift-modal-subtitle"></div>
            </div>
            <button id="gift-modal-close-btn" type="button" aria-label="Закрыть">×</button>
        </div>
        <div id="gift-modal-image" class="gift-modal-image"></div>
        <div id="gift-modal-info" class="gift-modal-info"></div>
        <div class="gift-modal-actions">
            <button id="gift-modal-select-btn" type="button">Выбрать</button>
            <button id="gift-modal-withdraw-btn" type="button">Вывод</button>
        </div>
    </div>
</div>

<nav class="tab-bar">
    <button class="tab-item active" data-tab="inventory">Склад</button>
    <button class="tab-item" data-tab="market">Витрина</button>
    <button class="tab-item" data-tab="orders">Обмены</button>
</nav>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.expand();
        tg.ready();
    }

    const user = tg?.initDataUnsafe?.user || null;
    const userId = user?.id || 0;
    const userLabel = user ? `${user.first_name || ""} ${user.last_name || ""}`.trim() : "Гость";

    const BASE_URL = "http://127.0.0.1:8080";
    const FEE_PER_PARTICIPANT_TON = 0.6;
    const bootOverlayEl = document.getElementById("boot-overlay");
    document.body.classList.add("boot-loading");

    const state = {
        gifts: [],
        listings: [],
        orders: [],
        withdrawals: [],
        marketSearch: "",
        marketFilters: {
            model: "",
            pattern: "",
            background: ""
        },
        activeFilterType: "",
        activeGiftIndex: -1,
        traitCatalog: {
            model: [],
            pattern: [],
            background: []
        },
        traitIcons: {
            model: {}
        }
    };

    const GIFT_PRESETS = [
        { match: /star.?gift.?unique/i, icon: "💎", title: "Уникальный Telegram Gift" },
        { match: /star.?gift/i, icon: "⭐", title: "Star Gift" },
        { match: /premium/i, icon: "👑", title: "Premium Gift" },
        { match: /unique/i, icon: "💠", title: "Уникальный подарок" },
        { match: /gift/i, icon: "🎁", title: "Telegram Gift" }
    ];

    function softHaptic(style = "light") {
        try {
            tg?.HapticFeedback?.impactOccurred(style);
        } catch (err) {
            console.debug("Haptic unavailable:", err);
        }
    }

    document.getElementById("user-name").textContent = userLabel;
    document.getElementById("avatar").textContent = (user?.first_name?.[0] || "G").toUpperCase();

    // Global mobile haptic for interactive controls
    document.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof Element)) return;
        if (target.closest("button, .tab-item, [onclick], select")) {
            softHaptic("light");
        }
    });

    document.querySelectorAll(".tab-item").forEach((btn) => {
        btn.addEventListener("click", () => switchTab(btn.dataset.tab, btn));
    });

    document.getElementById("create-listing-btn").addEventListener("click", createListingFromForm);
    document.getElementById("market-search-input").addEventListener("input", (event) => {
        state.marketSearch = String(event?.target?.value || "").trim().toLowerCase();
        renderMarket();
    });
    document.getElementById("market-model-filter-btn").addEventListener("click", () => openFilterPicker("model"));
    document.getElementById("market-pattern-filter-btn").addEventListener("click", () => openFilterPicker("pattern"));
    document.getElementById("market-background-filter-btn").addEventListener("click", () => openFilterPicker("background"));
    document.getElementById("filter-picker-close-btn").addEventListener("click", closeFilterPicker);
    document.getElementById("filter-picker-search").addEventListener("input", renderFilterPickerList);
    document.getElementById("filter-picker-reset-btn").addEventListener("click", resetActiveFilter);
    document.getElementById("gift-modal-close-btn").addEventListener("click", closeGiftModal);
    document.getElementById("gift-modal-select-btn").addEventListener("click", () => {
        if (state.activeGiftIndex >= 0) {
            prefillGift(state.activeGiftIndex);
            closeGiftModal();
        }
    });
    document.getElementById("gift-modal-withdraw-btn").addEventListener("click", () => {
        const gift = state.gifts[state.activeGiftIndex];
        if (!gift) return;
        const pretty = prettifyGift(gift);

    function renderMarket() {
        const root = document.getElementById("market-list");
        if (!state.listings.length) {
            root.innerHTML = '<div class="empty">Пока нет активных предложений.</div>';
            return;
        }

        const query = state.marketSearch;
        const filters = state.marketFilters;
        const filtered = state.listings.filter((item) => {
            const give = prettifyGift(item.gift_name);
            const want = prettifyGift(item.wanted_gift);
            const modelValues = [give.model, want.model].map((v) => String(v || "").toLowerCase());
            const patternValues = [give.pattern, want.pattern].map((v) => String(v || "").toLowerCase());
            const backgroundValues = [give.background, want.background].map((v) => String(v || "").toLowerCase());

            if (filters.model && !modelValues.some((v) => v.includes(filters.model))) return false;
            if (filters.pattern && !patternValues.some((v) => v.includes(filters.pattern))) return false;
            if (filters.background && !backgroundValues.some((v) => v.includes(filters.background))) return false;

            if (!query) return true;
            const haystack = [
                give.title,
                give.rawName,
                want.title,
                want.rawName,
                give.model,
                give.pattern,
                give.background,
                want.model,
                want.pattern,
                want.background,
                item.owner_name,
                item.status,
            ]
                .map((v) => String(v || "").toLowerCase())
                .join(" ");
            return haystack.includes(query);
        });

        if (!filtered.length) {
            root.innerHTML = '<div class="empty">По запросу ничего не найдено.</div>';
            return;
        }

        root.innerHTML = "";
        filtered.forEach((item) => {
            const give = prettifyGift(item.gift_name);
            const want = prettifyGift(item.wanted_gift);
            const div = document.createElement("div");
            div.className = "listing";
            div.innerHTML = `
                <div class="listing-top">
                    <div><b>${give.icon} Отдает: ${escapeHtml(give.title)}</b></div>
                    <div class="price">${want.icon} Хочет: ${escapeHtml(want.title)}</div>
                </div>
                <div class="row">
                    <span class="badge">user: ${item.owner_name}</span>
                    <span class="badge">${item.status}</span>
                </div>
                <div style="margin-top:7px;color:var(--muted);font-size:12px;">
                    Комиссия: ${FEE_PER_PARTICIPANT_TON} TON с каждого участника
                </div>
                <div class="row" style="margin-top:8px;">
                    <button class="success" onclick="requestExchangeById(${Number(item.id)})">Предложить обмен</button>
                    ${Number(item.owner_id) === Number(userId) ? `<button onclick="removeOffer(${item.id})">Убрать</button>` : ""}
                </div>
            `;
            root.appendChild(div);
        });
    }

    function refreshMarketFilterOptions() {
        const modelSet = new Set();
        const patternSet = new Set();
        const backgroundSet = new Set();
        const modelIconMap = {};

        const collectFromPretty = (pretty) => {
            const model = String(pretty?.model || "").trim();
            const pattern = String(pretty?.pattern || "").trim();
            const background = String(pretty?.background || "").trim();
            const image = String(pretty?.image || "").trim();
            if (model) modelSet.add(model);
            if (pattern) patternSet.add(pattern);
            if (background) backgroundSet.add(background);
            if (model && image) {
                const key = model.toLowerCase();
                if (!modelIconMap[key]) modelIconMap[key] = image;
            }
        };

        state.gifts.forEach((gift) => collectFromPretty(prettifyGift(gift)));
        state.listings.forEach((item) => {
            collectFromPretty(prettifyGift(item.gift_name));
            collectFromPretty(prettifyGift(item.wanted_gift));
        });
        state.traitCatalog.model.forEach((v) => modelSet.add(v));
        state.traitCatalog.pattern.forEach((v) => patternSet.add(v));
        state.traitCatalog.background.forEach((v) => backgroundSet.add(v));

        const sortFn = (a, b) => a.localeCompare(b, "ru");
        state.traitCatalog.model = Array.from(modelSet).sort(sortFn);
        state.traitCatalog.pattern = Array.from(patternSet).sort(sortFn);
        state.traitCatalog.background = Array.from(backgroundSet).sort(sortFn);
        state.traitIcons.model = modelIconMap;
        refreshFilterTriggerLabels();
    }

    function refreshFilterTriggerLabels() {
        const modelText = state.marketFilters.model ? `Модель: ${state.marketFilters.model}` : "Модель: Все";
        const patternText = state.marketFilters.pattern ? `Узор: ${state.marketFilters.pattern}` : "Узор: Все";
        const backgroundText = state.marketFilters.background ? `Фон: ${state.marketFilters.background}` : "Фон: Все";
        document.getElementById("market-model-filter-btn").textContent = modelText;
        document.getElementById("market-pattern-filter-btn").textContent = patternText;
        document.getElementById("market-background-filter-btn").textContent = backgroundText;
    }

    function openFilterPicker(type) {
        state.activeFilterType = type;
        const titles = { model: "Выбор модели", pattern: "Выбор узора", background: "Выбор фона" };
        document.getElementById("filter-picker-title").textContent = titles[type] || "Выбор";
        document.getElementById("filter-picker-search").value = "";
        document.getElementById("filter-picker-overlay").classList.add("open");
        renderFilterPickerList();
    }

    function closeFilterPicker() {
        document.getElementById("filter-picker-overlay").classList.remove("open");
        state.activeFilterType = "";
    }

    function applyFilterValue(value) {
        const type = state.activeFilterType;
        if (!type) return;
        state.marketFilters[type] = String(value || "").trim().toLowerCase();
        refreshFilterTriggerLabels();
        renderMarket();
        closeFilterPicker();
    }

    function resetActiveFilter() {
        applyFilterValue("");
    }

    function renderFilterPickerList() {
        const root = document.getElementById("filter-picker-list");
        const type = state.activeFilterType;
        if (!type) {
            root.innerHTML = "";
            return;
        }
        const query = String(document.getElementById("filter-picker-search").value || "").trim().toLowerCase();
        const current = String(state.marketFilters[type] || "").toLowerCase();
        const values = (state.traitCatalog[type] || [])
            .map((v) => String(v || "").trim())
            .filter((v) => v && (!query || v.toLowerCase().includes(query)));

        const allValues = [{ value: "", label: "Все варианты" }, ...values.map((v) => ({ value: v, label: v }))];
        if (!allValues.length) {
            root.innerHTML = '<div class="empty" style="grid-column:span 2;">Нет данных</div>';
            return;
        }
        root.innerHTML = "";
        allValues.forEach((item) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = `picker-item${item.value.toLowerCase() === current ? " active" : ""}`;
            if (type === "model" && item.value) {
                const wrap = document.createElement("span");
                wrap.className = "picker-item-content";
                const iconWrap = document.createElement("span");
                iconWrap.className = "picker-item-icon";
                const iconSrc = state.traitIcons.model[item.value.toLowerCase()];
                if (iconSrc) {
                    const img = document.createElement("img");
                    img.src = resolveImageUrl(iconSrc);
                    img.alt = "";
                    img.loading = "lazy";
                    iconWrap.appendChild(img);
                } else {
                    iconWrap.textContent = "🎁";
                }
                const text = document.createElement("span");
                text.className = "picker-item-label";
                text.textContent = item.label;
                wrap.appendChild(iconWrap);
                wrap.appendChild(text);
                btn.appendChild(wrap);
            } else {
                btn.textContent = item.label;
            }
            btn.addEventListener("click", () => applyFilterValue(item.value));
            root.appendChild(btn);
        });
    }

    function renderExchangeActions(order) {
        const isOwner = Number(order.owner_id) === Number(userId);
        if (order.status === "pending_owner_reply" && isOwner) {
            return `
                <button onclick="changeExchangeStatus(${order.id}, 'accept')">Принять</button>
                <button onclick="changeExchangeStatus(${order.id}, 'reject')">Отклонить</button>
            `;
        }
        if (order.status === "accepted") {
            return `<button onclick="changeExchangeStatus(${order.id}, 'to_escrow')">Передать в склад</button>`;
        }
        if (order.status === "in_escrow") {
            return `<button class="success" onclick="changeExchangeStatus(${order.id}, 'complete')">Завершить</button>`;
        }
        return "";

    function openGiftModal(index) {

        if (!gift) return;
        state.activeGiftIndex = index;
        const pretty = prettifyGift(gift);
        document.getElementById("gift-modal-title").textContent = pretty.title || "Подарок";
        const numberMatch = String(gift?.name || pretty.rawName || gift?.fragment_slug || "").match(/-(\d+)\b/);

    async function createListingFromForm() {
        const giftName = document.getElementById("gift-select").value;
        const wantedGift = document.getElementById("wanted-gift-input").value.trim();

        if (!giftName) return tg?.showAlert("Выбери подарок, который отдаешь");
        if (!wantedGift) return tg?.showAlert("Укажи, что хочешь получить в обмен");

        const exists = state.listings.some((x) => x.gift_name === giftName && x.status === "active");
        if (exists) return tg?.showAlert("Этот подарок уже опубликован в витрине");

        try {
            const response = await fetch(`${BASE_URL}/offers`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    owner_id: userId,
                    owner_name: userLabel,
                    gift_name: giftName,
                    wanted_gift: wantedGift
                })
            });
            const data = await response.json();
            if (!response.ok || !data.ok) throw new Error(data.error || "cannot create offer");
            await loadOffers();
            tg?.showPopup({
                title: "Оффер опубликован",
                message: `Отдаешь "${giftName}", хочешь "${wantedGift}"`,
                buttons: [{ type: "ok" }]
            });
        } catch (err) {
            console.error(err);
            tg?.showAlert("Не удалось создать оффер");
        }
    }

    async function requestExchange(index) {
        const listing = state.listings[index];
        if (!listing || listing.status !== "active") return;
        if (listing.owner_id === userId) {
            return tg?.showAlert("Нельзя отправить обмен самому себе");
        }

        try {
            const response = await fetch(`${BASE_URL}/exchanges`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    offer_id: listing.id,
                    requester_id: userId,
                    requester_name: userLabel,
                    fee_per_user_ton: FEE_PER_PARTICIPANT_TON
                })
            });
            const data = await response.json();
            if (!response.ok || !data.ok) throw new Error(data.error || "cannot create exchange");
            await loadMyExchanges();
            tg?.sendData(JSON.stringify({ action: "create_exchange_request", exchange: data.exchange }));
            tg?.showAlert(`Запрос отправлен: ${data.exchange.id}\nКомиссия: ${data.exchange.fee_per_user_ton} TON с каждого`);
        } catch (err) {
            console.error(err);
            tg?.showAlert("Не удалось отправить запрос обмена");
        }
    }

    async function requestExchangeById(offerId) {
        const index = state.listings.findIndex((item) => Number(item.id) === Number(offerId));
        if (index < 0) {
            tg?.showAlert("Оффер не найден. Обнови витрину.");
            return;
        }
        await requestExchange(index);
    }

    async function askWithdrawConfirm(giftTitle) {
        if (!tg || !tg.showPopup) {
            return confirm(`Создать заявку на вывод "${giftTitle}"?\nКомиссия передачи: 25⭐`);
        }
        return new Promise((resolve) => {
            tg.showPopup(
                {
                    title: "Вывод подарка",
                    message: `Создать заявку на вывод "${giftTitle}"?\nКомиссия передачи: 25⭐`,
                    buttons: [
                        { id: "cancel", type: "cancel", text: "Отмена" },
                        { id: "ok", type: "default", text: "Создать заявку" }
                    ]
                },
                (buttonId) => resolve(buttonId === "ok")
            );
        });
    }

    async function withdrawGift(giftId, giftTitle) {
        if (!giftId) return tg?.showAlert("Нельзя вывести: отсутствует ID подарка");
        const proceed = await askWithdrawConfirm(giftTitle);
        if (!proceed) return;

        try {
            const response = await fetch(`${BASE_URL}/withdraw_gift`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_id: userId, gift_id: giftId })
            });
            const data = await response.json();
            if (!response.ok || !data.ok) {
                if (data?.error === "already_requested") {
                    return tg?.showAlert("Заявка на вывод уже создана и ждет обработки.");
                }
                throw new Error(data?.error || "withdraw failed");
            }
            await loadInventory();
            await loadWithdrawals();
            tg?.showAlert(
                `Заявка на вывод создана.\nID: ${data.withdraw_request_id}\nСтатус: ${data.withdraw_status || "pending"}`
            );
        } catch (err) {
            console.error(err);
            tg?.showAlert(`Не удалось создать заявку на вывод: ${err.message}`);
        }
    }

    async function changeExchangeStatus(exchangeId, action) {

            const response = await fetch(`${BASE_URL}/exchanges/${exchangeId}/status`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ actor_id: userId, action })
            });
            const data = await response.json();
            if (!response.ok || !data.ok) throw new Error(data.error || "cannot update exchange");
            await loadOffers();
            await loadMyExchanges();
            tg?.showAlert(`Статус обновлен: ${data.exchange.status}`);
        } catch (err) {
            console.error(err);
            tg?.showAlert(`Ошибка: ${err.message}`);
        }
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    function resolveImageUrl(imagePath) {
        const raw = String(imagePath || "").trim();
        if (!raw) return "";
        if (raw.startsWith("http://") || raw.startsWith("https://")) return raw;
        if (raw.startsWith("/")) return `${BASE_URL}${raw}`;
        return `${BASE_URL}/${raw}`;
    }

    function normalizeGiftInput(giftInput) {
        if (typeof giftInput === "string") {
            return { rawName: giftInput, rawImage: "" };
        }
        if (!giftInput || typeof giftInput !== "object") {
            return { rawName: "", rawImage: "" };
        }

        const image =
            giftInput.image ||
            giftInput.gift_image ||
            giftInput.fragment_image ||
            "";

        const title =
            giftInput.title ??
            "";
        const model =
            giftInput.model ??
            "";
        const pattern =
            giftInput.pattern ??
            "";
        const background =
            giftInput.background ??
            "";

        let nameCandidate =
            giftInput.name ??
            giftInput.gift_name ??
            giftInput.title ??
            giftInput.gift ??
            "";

        if (nameCandidate && typeof nameCandidate === "object") {
            nameCandidate =
                nameCandidate.name ??
                nameCandidate.title ??
                nameCandidate.id ??
                "";
        }

        const rawName = String(nameCandidate || "");
        return {
            rawName,
            rawImage: String(image || ""),
            title: String(title || ""),
            model: String(model || ""),
            pattern: String(pattern || ""),
            background: String(background || "")
        };
    }

    function prettifyGift(giftInput) {
        const normalizedInput = normalizeGiftInput(giftInput);
        const rawName = normalizedInput.rawName;
        const rawImage = normalizedInput.rawImage;
        const metaTitle = normalizedInput.title;
        const metaModel = normalizedInput.model;
        const metaPattern = normalizedInput.pattern;
        const metaBackground = normalizedInput.background;
        const raw = rawName.trim();
        const normalized = raw
            .replaceAll("_", " ")
            .replaceAll("-", " ")
            .replace("MessageAction", "")
            .replace("StarGiftUnique", "Уникальный Star Gift")
            .replace("StarGift", "Star Gift")
            .replace("GiftUnique", "Уникальный Gift")
            .replace("Gift", "Gift")
            .replace(/\s+/g, " ")
            .trim();

        for (const preset of GIFT_PRESETS) {
            if (preset.match.test(raw) || preset.match.test(normalized)) {
                // If payload contains a readable title, keep it.
                const readable = metaTitle || (normalized && normalized.length > 3 ? normalized : preset.title);
                return {
                    icon: preset.icon,
                    title: readable,
                    image: rawImage,
                    rawName: raw,
                    model: metaModel,
                    pattern: metaPattern,
                    background: metaBackground
                };
            }
        }

        const fallbackTitle = metaTitle || normalized || "Telegram Gift";
        return {
            icon: "🎁",
            title: fallbackTitle,
            image: rawImage,
            rawName: raw,
            model: metaModel,
            pattern: metaPattern,
            background: metaBackground
        };
    }

    function finishBootLoading() {
        bootOverlayEl?.classList.add("hidden");
        window.setTimeout(() => {
            document.body.classList.remove("boot-loading");
        }, 300);
    }

    async function initializeApp() {
        const bootTimeout = window.setTimeout(() => {
            finishBootLoading();
        }, 7000);
        try {
            await Promise.allSettled([
                loadOffers(),
                loadMyExchanges(),
                loadInventory(),
                loadWithdrawals(),
                loadTraitCatalog()
            ]);
        } finally {
            window.clearTimeout(bootTimeout);
            finishBootLoading();
        }
    }

    initializeApp();
</script>
